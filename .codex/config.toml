model = "gpt-5.4"
reasoning_effort = "medium"

[project]
memory_file = "AGENTS.md"

[preferences]
language = "zh-TW"
confirm_before_destructive = true

[paths]
docs = "docs"
plans = "docs/plans"
plan_archive = "docs/plans/archive"
dev_rules = "docs/DEVELOPMENT.md"
architecture = "docs/ARCHITECTURE.md"
features = "docs/FEATURES.md"
testing = "docs/TESTING.md"

[guards]
hide_secrets_in_frontend = true
require_docs_update_for_feature = true
prefer_codex_over_claude_setup = true
